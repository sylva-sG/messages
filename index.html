<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Messages</title>
    
    <!-- PWA Settings for Fullscreen Mobile App Setup -->
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Messages%22,%22short_name%22:%22Messages%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23121212%22,%22theme_color%22:%22%231e1e1e%22}">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg-color: #000000;
            --surface-color: #161618;
            --text-color: #ffffff;
            --text-secondary: #8e8e93;
            --accent-color: #0b84ff;
            --bubble-received: #262628;
            --border-color: #2c2c2e;
            --danger-color: #ff453a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #1c1c1e;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .app-container {
            width: 100vw;
            height: 100vh;
            max-width: 480px;
            max-height: 920px;
            background-color: var(--bg-color);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
        }

        @media (min-width: 481px) {
            .app-container {
                border-radius: 32px;
                border: 4px solid #2c2c2e;
                height: 85vh;
            }
        }

        .view {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background-color: var(--bg-color);
            z-index: 5;
        }

        .hidden { display: none !important; }

        .header {
            background-color: var(--surface-color);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            font-size: 1.3rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .header-left, .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--accent-color);
            font-size: 1.6rem;
            font-weight: bold;
            cursor: pointer;
            padding: 4px 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:active { opacity: 0.6; }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            background-color: var(--bg-color);
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid #1c1c1e;
            cursor: pointer;
            position: relative;
        }

        .chat-item:active { background-color: #1c1c1e; }

        .avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.3rem;
            margin-right: 16px;
            color: #ffffff;
            flex-shrink: 0;
        }

        .avatar.default {
            background-color: #3a3a3c;
            color: var(--text-secondary);
            font-size: 1.5rem;
        }

        .chat-info {
            flex: 1;
            overflow: hidden;
            padding-right: 10px;
        }

        .chat-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .chat-name {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-color);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-time {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .chat-preview-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-preview {
            color: var(--text-secondary);
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .delete-chat-btn {
            background: none;
            border: none;
            color: var(--danger-color);
            font-size: 0.9rem;
            cursor: pointer;
            padding: 4px;
            display: none;
        }

        /* Show delete button for non-default chats on hover/interaction */
        .chat-item:hover .delete-chat-btn {
            display: block;
        }

        .message-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background-color: var(--bg-color);
        }

        .message-group {
            display: flex;
            flex-direction: column;
            max-width: 78%;
            gap: 4px;
        }

        .message-group.received { align-self: flex-start; }
        .message-group.sent { align-self: flex-end; align-items: flex-end; }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 1rem;
            line-height: 1.4;
            word-wrap: break-word;
            color: var(--text-color);
            width: 100%;
        }

        .message-group.received .message-bubble {
            background-color: var(--bubble-received);
        }

        .message-group.sent .message-bubble {
            background-color: var(--accent-color);
            color: #ffffff;
        }

        .message-timestamp {
            font-size: 0.75rem;
            color: var(--text-secondary);
            padding: 0 6px;
        }

        .generator-panel {
            background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            animation: slideDown 0.2s ease-out;
            flex-shrink: 0;
        }

        .generator-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        @keyframes slideDown {
            from { transform: translateY(-10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .generator-panel input {
            flex: 1;
            background-color: #000000;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 10px 16px;
            color: var(--text-color);
            font-size: 0.95rem;
            outline: none;
        }

        .generator-panel select {
            background-color: #000000;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 8px 12px;
            font-size: 0.9rem;
            outline: none;
        }

        .action-link-btn {
            background: none;
            border: none;
            color: var(--danger-color);
            font-size: 0.85rem;
            cursor: pointer;
            text-align: left;
            padding: 2px 4px;
            align-self: flex-start;
        }

        .fab {
            position: absolute;
            bottom: 30px;
            right: 24px;
            background-color: var(--accent-color);
            color: #ffffff;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 2.2rem;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .fab:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="app-container">

        <!-- SCREEN 1: CHAT LIST VIEW LAYER -->
        <div id="list-view" class="view">
            <div class="header">
                <div>Messages</div>
            </div>
            <div id="chats-container" class="chat-list">
                <!-- Loaded Dynamically -->
            </div>
            <button class="fab" id="new-chat-btn">+</button>
        </div>

        <!-- SCREEN 2: ACTIVE CONVERSATION TREE PANEL -->
        <div id="chat-view" class="view hidden">
            <div class="header">
                <div class="header-left">
                    <button class="icon-btn" id="back-btn">‹</button>
                    <span id="active-chat-title">Chat</span>
                </div>
                <div class="header-right">
                    <button class="icon-btn" id="menu-btn">⋮</button>
                </div>
            </div>

            <!-- Hidden Custom Production Entry Segment -->
                        <!-- Hidden Custom Production Entry Segment -->
            <div id="generator-panel" class="generator-panel hidden">
                <div class="generator-row">
                    <input type="text" id="gen-input" placeholder="Type message detailing context...">
                    <select id="msg-type">
                        <option value="received">Receive</option>
                        <option value="sent">Send</option>
                    </select>
                    <button class="icon-btn" id="send-gen-btn" style="font-size: 1rem;">Generate</button>
                </div>
                <!-- Clean Management Addition -->
                <button class="action-link-btn" id="clear-history-btn">Wipe Chat History</button>
            </div>

            <div id="messages-container" class="message-container">
                <!-- Loaded Dynamically -->
            </div>
        </div>

    </div>

    <script>
        // PWA Offline Core Initialization Engine
        if ('serviceWorker' in navigator) {
            const swCode = `self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => caches.match(e.request))));`;
            const blob = new Blob([swCode], {type: 'application/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        }

        const avatarColors = ["#ef5350", "#ec407a", "#ab47bc", "#7e57c2", "#26a69a", "#26c6da", "#42a5f5", "#ffa726", "#8d6e63"];

        // Format system tool for local message tracking
        function getFormattedTime() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; 
            return `${hours}:${minutes} ${ampm}`;
        }

        // Secure Default Fallback Data Tree Array
        const defaultState = {
            "mpesa": { id: "mpesa", name: "M-PESA", isDefault: true, messages: [{text: "MPESA Confirmation: You received KSH 2,400.", type: "received", time: "10:14 AM"}] },
            "safaricom": { id: "safaricom", name: "Safaricom", isDefault: true, messages: [{text: "Welcome back! Tunukiwa bundles updated. Dial *544#.", type: "received", time: "11:30 AM"}] },
            "google": { id: "google", name: "Google", isDefault: true, messages: [{text: "Your security verification profile authentication token code is 482019.", type: "received", time: "02:15 PM"}] }
        };

        // Permanent Offline Storage Extraction Engine
        const savedChats = localStorage.getItem("mock_sms_chats");
        const state = {
            activeChatId: null,
            chats: savedChats ? JSON.parse(savedChats) : defaultState
        };

        function saveToStorage() {
            localStorage.setItem("mock_sms_chats", JSON.stringify(state.chats));
        }

        const listView = document.getElementById("list-view");
        const chatView = document.getElementById("chat-view");
        const chatsContainer = document.getElementById("chats-container");
        const messagesContainer = document.getElementById("messages-container");
        const activeChatTitle = document.getElementById("active-chat-title");
        const generatorPanel = document.getElementById("generator-panel");
        const genInput = document.getElementById("gen-input");
        const msgTypeSelect = document.getElementById("msg-type");

        function getAvatarStyle(chat) {
            if (chat.isDefault) return { text: "👤", bg: "#3a3a3c", isDefault: true };
            const firstLetter = chat.name.charAt(0).toUpperCase();
            const colorIndex = chat.name.length % avatarColors.length;
            return { text: firstLetter, bg: avatarColors[colorIndex], isDefault: false };
        }

        function renderChatList() {
            chatsContainer.innerHTML = "";
            Object.values(state.chats).forEach(chat => {
                const avatar = getAvatarStyle(chat);
                const lastMsgObj = chat.messages[chat.messages.length - 1];
                const lastMsg = lastMsgObj ? lastMsgObj.text : "No messages yet";
                const lastTime = lastMsgObj ? lastMsgObj.time : "";
                
                const item = document.createElement("div");
                item.className = "chat-item";
                item.innerHTML = `
                    <div class="avatar ${avatar.isDefault ? 'default' : ''}" style="background-color: ${avatar.bg}">
                        ${avatar.text}
                    </div>
                    <div class="chat-info">
                        <div class="chat-meta">
                            <div class="chat-name">${chat.name}</div>
                            <div class="chat-time">${lastTime}</div>
                        </div>
                        <div class="chat-preview-row">
                            <div class="chat-preview">${lastMsg}</div>
                            ${!chat.isDefault ? `<button class="delete-chat-btn" data-id="${chat.id}">Delete</button>` : ''}
                        </div>
                    </div>
                `;
                
                item.onclick = (e) => {
                    if (e.target.classList.contains("delete-chat-btn")) {
                        e.stopPropagation();
                        const targetId = e.target.getAttribute("data-id");
                        if (confirm(`Are you sure you want to completely delete the chat room with ${state.chats[targetId].name}?`)) {
                            delete state.chats[targetId];
                            saveToStorage();
                            renderChatList();
                        }
                        return;
                    }
                    openChat(chat.id);
                };
                
                chatsContainer.appendChild(item);
            });
        }

        function openChat(chatId) {
            state.activeChatId = chatId;
            activeChatTitle.textContent = state.chats[chatId].name;
            generatorPanel.classList.add("hidden");
            genInput.value = "";
            renderMessages();
            listView.classList.add("hidden");
            chatView.classList.remove("hidden");
        }

        document.getElementById("back-btn").onclick = () => {
            chatView.classList.add("hidden");
            listView.classList.remove("hidden");
            renderChatList();
        };

        document.getElementById("menu-btn").onclick = () => {
            generatorPanel.classList.toggle("hidden");
            if (!generatorPanel.classList.contains("hidden")) {
                genInput.focus();
            }
        };

        function renderMessages() {
            messagesContainer.innerHTML = "";
            const currentChat = state.chats[state.activeChatId];
            currentChat.messages.forEach(msg => {
                const group = document.createElement("div");
                group.className = `message-group ${msg.type || 'received'}`;
                
                const bubble = document.createElement("div");
                bubble.className = "message-bubble";
                bubble.textContent = msg.text;
                
                const timeLabel = document.createElement("div");
                timeLabel.className = "message-timestamp";
                timeLabel.textContent = msg.time || "";

                group.appendChild(bubble);
                group.appendChild(timeLabel);
                messagesContainer.appendChild(group);
            });
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        document.getElementById("new-chat-btn").onclick = () => {
            const name = prompt("Enter contact name for the new chat:");
            if (!name || name.trim() === "") return;
            const id = "custom_" + Date.now();
            state.chats[id] = { id: id, name: name.trim(), isDefault: false, messages: [] };
            saveToStorage();
            renderChatList();
        };

        document.getElementById("send-gen-btn").onclick = function() {
            const text = genInput.value.trim();
            if (text === "") return;
            
            state.chats[state.activeChatId].messages.push({
                text: text,
                type: msgTypeSelect.value,
                time: getFormattedTime()
            });
            
            saveToStorage();
            renderMessages();
            genInput.value = "";
            generatorPanel.classList.add("hidden");
        };

        document.getElementById("clear-history-btn").onclick = function() {
            if (confirm("Clear all text message entries inside this thread?")) {
                state.chats[state.activeChatId].messages = [];
                saveToStorage();
                renderMessages();
                generatorPanel.classList.add("hidden");
            }
        };

        renderChatList();
    </script>
</body>
</html>
